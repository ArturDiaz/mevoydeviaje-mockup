<head>

<body class="page-index icons-svg text-3.5">

    <main class="w-responsive py-7">

                        </div>
                    </div>
                    <div class="item-box w-full flex-c border-r-5 card-product">
                        <div class="bg-default w-full h-40 border-r-5-5-0-0"></div>
                        <div class="content-item bg-white p-4 flex-c gap-3 border-r-0-0-5-5">

                    <div class="item-box w-full flex-c border-r-5 card-product">

                        <div class="bg-default w-full h-40 border-r-5-5-0-0"></div>
                        <div class="content-item bg-white p-4 flex-c gap-3 border-r-0-0-5-5">
                            <h3>Producto 4</h4>
                            <div class="flex-c">
                                <span>Precio desde</span>
                                <span class="price text-5 font-bold">USD 100</span>
                            </div>

                    </div>
                </div>
            </div>
        </section>
    </main>
    <footer>

    </footer>

    <!-- Modal de ejemplo: copiar este bloque .modal y cambiar el id para reutilizarlo -->
    <button type="button" class="btn btn-primary" data-toggle="modal" data-target="#demoModal">Abrir modal</button>
    <div class="modal" id="demoModal">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="header-modal">
                    <h3>Titulo del modal</h3>
                    <button type="button" class="modal-close" data-dismiss="modal">
                        <svg class="bs-icon"><use xlink:href="#i-x"></use></svg>
                    </button>
                </div>
                <div class="body-modal">
                    <p>Contenido del modal.</p>
                </div>
                <div class="footer-modal">
                    <button type="button" class="btn btn-default-outline" data-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" data-dismiss="modal">Aceptar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/scriptCss.js"></script>
    <script src="js/destinations-data.js"></script>
